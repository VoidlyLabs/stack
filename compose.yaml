name: ${STACK_NAME:-voidly}

services:
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false

      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https

      - --certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web

      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
  mongo:
    image: mongo:${MONGO_VERSION:-7}
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - type: bind
        source: ${MONGO_DATA_PATH:-/var/lib/voidly/mongo}
        target: /data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  core:
    build:
      context: ${CORE_PATH}
      dockerfile: ${CORE_DOCKERFILE}
      args:
        NODE_BUILD_MEMORY_MB: ${NODE_BUILD_MEMORY_MB:-768}
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      NODE_ENV: ${CORE_NODE_ENV}
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      SERVER_JWT_SECRET: ${SERVER_JWT_SECRET}
      CLIENT_JWT_SECRET: ${CLIENT_JWT_SECRET}
      PASSWORD_SALT_ROUNDS: ${PASSWORD_SALT_ROUNDS}
      CLIENT_TOKEN_MAX_AGE_HRS: ${CLIENT_TOKEN_MAX_AGE_HRS}
      USER_TOKEN_MAX_AGE_HRS: ${USER_TOKEN_MAX_AGE_HRS}
      USER_TOKEN_COOKIE: ${USER_TOKEN_COOKIE}
      CLIENT_TOKEN_COOKIE: ${CLIENT_TOKEN_COOKIE}
      LOCAL_STORAGE_PATH: /app/storage/uploads
      LOCAL_STORAGE_PUBLIC_PATH: /uploads
      LOCAL_STORAGE_BASE_URL: ${PUBLIC_CORE_URL}
      INITIAL_USER_USERNAME: ${INITIAL_USER_USERNAME}
      INITIAL_USER_PASSWORD: ${INITIAL_USER_PASSWORD}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    volumes:
      - core_uploads:/app/storage/uploads
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\"" ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    command: [ "npm", "run", "start:prod" ]
    labels:
      - traefik.enable=true

      - traefik.http.routers.voidly-core.rule=Host(`${CORE_HOST}`)
      - traefik.http.routers.voidly-core.entrypoints=websecure
      - traefik.http.routers.voidly-core.tls=true
      - traefik.http.routers.voidly-core.tls.certresolver=le

      - traefik.http.services.voidly-core.loadbalancer.server.port=3000

  admin:
    build:
      context: ${ADMIN_PATH}
      dockerfile: ${ADMIN_DOCKERFILE}
      args:
        NEXT_PUBLIC_BACKEND_URL: ${PUBLIC_CORE_URL}
        NEXT_PUBLIC_ADMIN_URL: ${ADMIN_PUBLIC_URL}
        NODE_BUILD_MEMORY_MB: ${NODE_BUILD_MEMORY_MB:-768}
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_BACKEND_URL: ${PUBLIC_CORE_URL}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_PUBLIC_URL}
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://127.0.0.1:3000 >/dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    labels:
      - traefik.enable=true

      - traefik.http.routers.voidly-admin.rule=Host(`${ADMIN_HOST}`)
      - traefik.http.routers.voidly-admin.entrypoints=websecure
      - traefik.http.routers.voidly-admin.tls=true
      - traefik.http.routers.voidly-admin.tls.certresolver=le

      - traefik.http.services.voidly-admin.loadbalancer.server.port=3000

  app:
    build:
      context: ${APP_PATH}
      dockerfile: ${APP_DOCKERFILE}
      args:
        NEXT_PUBLIC_BACKEND_URL: ${PUBLIC_CORE_URL}
        ORIGIN: ${APP_PUBLIC_URL}
        NODE_BUILD_MEMORY_MB: ${NODE_BUILD_MEMORY_MB:-768}
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
    expose:
      - "3002"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_BACKEND_URL: ${PUBLIC_CORE_URL}
      ORIGIN: ${APP_PUBLIC_URL}
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://127.0.0.1:3000 >/dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    labels:
      - traefik.enable=true

      - traefik.http.routers.voidly-app.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.voidly-app.entrypoints=websecure
      - traefik.http.routers.voidly-app.tls=true
      - traefik.http.routers.voidly-app.tls.certresolver=le

      - traefik.http.services.voidly-app.loadbalancer.server.port=3000

volumes:
  core_uploads:
  traefik_certs:
